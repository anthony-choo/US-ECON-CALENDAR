name: Update USD Economic Calendar

on:
  schedule:
    # Every Sunday at 08:00 UTC (covers the coming week)
    - cron: "0 8 * * 0"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate ICS file
        run: python generate_calendar.py

      - name: Commit & push updated calendar
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/calendar.ics
          git diff --staged --quiet \
            && echo "No changes to commit" \
            || git commit -m "🗓️ Update USD calendar $(date -u +'%Y-%m-%d')" && git push
